<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in - Google Accounts</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #202124;
    }
    .card {
      width: 100%;
      max-width: 450px;
      padding: 40px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      box-sizing: border-box;
      text-align: center;
    }
    .logo {
      width: 75px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 500;
      margin: 0 0 8px 0;
      line-height: 1.3;
    }
    .subtitle {
      font-size: 16px;
      color: #5f6368;
      margin: 0 0 24px 0;
    }
    .account-list {
      text-align: left;
      border-top: 1px solid #dadce0;
      margin-bottom: 24px;
    }
    .account-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #dadce0;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .account-item:hover {
      background-color: #f8f9fa;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: #1a73e8;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 500;
      font-size: 14px;
      margin-right: 12px;
    }
    .details {
      display: flex;
      flex-direction: column;
    }
    .name {
      font-size: 14px;
      font-weight: 500;
    }
    .email {
      font-size: 12px;
      color: #5f6368;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #757575;
      margin-top: 24px;
    }
    .footer a {
      color: #1a73e8;
      text-decoration: none;
    }
    .spinner {
      display: none;
      width: 28px;
      height: 28px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #1a73e8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 32px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="logo" viewBox="0 0 24 24" fill="none">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
    </svg>
    <h1 id="title-header">Choose an account</h1>
    <div class="subtitle" id="subtitle-header">to continue to Sentinel Civic</div>

    <div class="spinner" id="spinner"></div>

    <div class="account-list" id="account-list">
      <div class="account-item" onclick="selectAccount('hanup@gmail.com', 'Hanu P')">
        <div class="avatar" style="background-color: #e91e63;">HP</div>
        <div class="details">
          <span class="name">Hanu P</span>
          <span class="email">hanup@gmail.com</span>
        </div>
      </div>
      <div class="account-item" onclick="selectAccount('nidhi.mehta@gmail.com', 'Nidhi Mehta')">
        <div class="avatar" style="background-color: #9c27b0;">NM</div>
        <div class="details">
          <span class="name">Nidhi Mehta</span>
          <span class="email">nidhi.mehta@gmail.com</span>
        </div>
      </div>
      <div class="account-item" onclick="selectAccount('google.hero@gmail.com', 'Google Hero')">
        <div class="avatar" style="background-color: #1a73e8;">GH</div>
        <div class="details">
          <span class="name">Google Hero</span>
          <span class="email">google.hero@gmail.com</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <span>English (United States)</span>
      <div>
        <a href="#">Help</a>
        <a href="#" style="margin-left: 10px;">Privacy</a>
        <a href="#" style="margin-left: 10px;">Terms</a>
      </div>
    </div>
  </div>

  <script>
    function selectAccount(email, displayName) {
      document.getElementById('account-list').style.display = 'none';
      document.getElementById('title-header').innerText = 'Signing you in...';
      document.getElementById('subtitle-header').innerText = 'Please wait while we verify details';
      document.getElementById('spinner').style.display = 'block';

      setTimeout(() => {
        if (window.opener) {
          window.opener.postMessage({
            type: 'GOOGLE_AUTH_SUCCESS',
            email: email,
            displayName: displayName
          }, window.location.origin);
        }
        window.close();
      }, 1000);
    }
  </script>
</body>
</html>
